# Local-only profile used by quoter-hardening-anvil.sh. The canonical
# websocket is deliberately routed through a fault-injection proxy while state
# hydration reads from the pinned upstream endpoint.
extends = "ethereum-mainnet"
replace_tokens = true
replace_factories = true
replace_pools = true

[server]
listen = "${ANVIL_SIDECAR_LISTEN}"
max_in_flight_quotes = 32
admin_bearer_token = "${AMM_ROUTE_ADMIN_TOKEN}"

[rpc]
canonical_ws = "${ANVIL_PROXY_WS_URL}"
canonical_ws_fallbacks = ["${ANVIL_FALLBACK_PROXY_WS_URL}"]
canonical_max_stale_secs = 15
canonical_health_check_interval_ms = 250
canonical_reconnect_initial_delay_ms = 250
canonical_reconnect_max_delay_ms = 2000
canonical_rebuild_timeout_secs = 120
canonical_transport_max_retries = 20
canonical_transport_retry_interval_ms = 500
canonical_stream_reconnect_retry_delay_ms = 250
canonical_stream_reconnect_max_delay_ms = 2000
canonical_stream_dedupe_window = 4096
batch_size = 25
cold_start_concurrency = 2
point_read_slots_per_batch = 50
point_read_concurrency = 2
bulk_max_concurrent_calls = 1

[[rpc.state]]
url = "${ETHEREUM_RPC_URL}"
weight = 100
max_in_flight = 32

[routing]
default_quality = "balanced"
default_max_hops = 3
default_top_k = 1
default_timeout_ms = 5000
max_hops = 4
max_top_k = 5
max_timeout_ms = 15000
max_candidates = 50000
allow_exhaustive = true
route_worker_threads = 4
max_subscriptions = 128

[discovery]
quote_default = "off"
max_startup_pools = 16
max_concurrent_requests = 2
negative_ttl_secs = 30

[[tokens]]
symbol = "USDC"
address = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
decimals = 6
connector = true

[[tokens]]
symbol = "WETH"
address = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
decimals = 18
connector = true

[[factories]]
name = "uniswap-v2"
protocol = "uniswap-v2"
address = "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"
fee_bps = 30

[[factories]]
name = "uniswap-v3"
protocol = "uniswap-v3"
address = "0x1F98431c8aD98523631AE4a59f267346ea31F984"
quoter = "0x61fFE014bA17989E743c5F6cB21bF9697530B21e"

[[pools]]
protocol = "uniswap_v2"
address = "0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc"
tokens = [
  "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",
  "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2",
]
fee_bps = 30

[[pools]]
