# Local-only end-to-end profile used by executor-e2e-anvil.sh.
extends = "ethereum-mainnet"
replace_tokens = true
replace_factories = true
replace_pools = true

[server]
listen = "${ANVIL_SIDECAR_LISTEN}"
admin_bearer_token = "${AMM_ROUTE_ADMIN_TOKEN}"

[rpc]
canonical_ws = "${ANVIL_WS_URL}"
batch_size = 25
cold_start_concurrency = 2
point_read_slots_per_batch = 50
point_read_concurrency = 2
bulk_max_concurrent_calls = 1

[[rpc.state]]
url = "${ETHEREUM_RPC_URL}"
weight = 100
max_in_flight = 32

[routing]
default_quality = "balanced"
default_max_hops = 3
default_top_k = 5
default_timeout_ms = 10000
max_hops = 4
max_top_k = 64
max_timeout_ms = 20000
allow_exhaustive = true

[discovery]
quote_default = "if_missing"
max_startup_pools = 16
max_concurrent_requests = 2
negative_ttl_secs = 30

