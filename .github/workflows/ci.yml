name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  checks: write

defaults:
  run:
    working-directory: evm-amm-search

jobs:
  check:
    name: test / clippy / fmt / docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: evm-amm-search
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/evm-amm-state
          path: evm-amm-state
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/evm-fork-cache
          path: evm-fork-cache
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/alloy-transport-balancer
          path: alloy-transport-balancer

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            evm-amm-search
            evm-amm-search/sidecar

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Sidecar formatting
        run: cargo fmt --manifest-path sidecar/Cargo.toml --all -- --check

      - name: Tests
        run: cargo test --all-features

      - name: Sidecar tests
        run: cargo test --locked --manifest-path sidecar/Cargo.toml

      - name: Feature isolation
        run: cargo check --all-targets --no-default-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Sidecar clippy
        run: cargo clippy --locked --manifest-path sidecar/Cargo.toml --all-targets -- -D warnings

      - name: Docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Sidecar docs
        run: cargo doc --locked --manifest-path sidecar/Cargo.toml --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Security audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: evm-amm-search
          # Inactive optional dependency recorded by ark-relations; see
          # RELEASING.md for the command that verifies it is not in the graph.
          ignore: RUSTSEC-2025-0055

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: evm-amm-search
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/evm-amm-state
          path: evm-amm-state
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/evm-fork-cache
          path: evm-fork-cache
      - uses: actions/checkout@v4
        with:
          repository: KaiCode2/alloy-transport-balancer
          path: alloy-transport-balancer

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            evm-amm-search
            evm-amm-search/sidecar

      - run: cargo check --all-features

      - run: cargo check --locked --manifest-path sidecar/Cargo.toml

  sidecar-container:
    name: sidecar container smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          path: evm-amm-search

      - name: Validate sidecar Compose profile
        run: docker compose -f sidecar/compose.yaml config --quiet
        env:
          ETHEREUM_WS_URL: wss://rpc.example.invalid
          AMM_ROUTE_ADMIN_TOKEN: compose-validation-only

      - name: Build sidecar image
        run: docker build -f sidecar/Dockerfile -t evm-amm-route-sidecar:ci .

      - name: Smoke sidecar image
        run: sidecar/scripts/smoke-container.sh evm-amm-route-sidecar:ci
